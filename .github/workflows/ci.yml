name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  demo-pipeline:
    name: Demo Pipeline And Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Compile Python modules
        run: python -m compileall src tests

      - name: Run demo warehouse pipeline
        run: make PYTHON=python demo-smoke

      - name: Run demo model training
        run: make PYTHON=python demo-train

      - name: Run demo explanation report
        run: make PYTHON=python demo-explain

      - name: Run tests
        run: make PYTHON=python test
